<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JDP SISTEMAS — SOBERANO FILE MANAGER v13.5</title>
    <!-- TAILWIND E ICONES PARA ALTA PERFORMANCE -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">

    <!-- CAPACITOR RUNTIME (Injetado automaticamente pelo Capacitor no APK) -->
    <script src="capacitor.js"></script>

    <style>
        :root { 
            --gold: #fde047; 
            --bg: #020617; 
            --cyan: #06b6d4; 
        }
        body { 
            margin: 0; 
            background: var(--bg); 
            color: var(--gold); 
            font-family: 'JetBrains Mono', monospace; 
            user-select: none; 
            -webkit-user-select: none; 
        }
        .app-bar { 
            background: #0b1329; 
            border-bottom: 2px solid var(--cyan); 
        }
        .file-item { 
            border-bottom: 1px solid rgba(253, 224, 71, 0.05); 
            transition: all 0.2s ease; 
        }
        .file-item:hover { 
            background: rgba(6, 182, 212, 0.08); 
            border-left: 4px solid var(--cyan); 
        }
        .jdp-card { 
            background: rgba(11, 19, 41, 0.95); 
            border: 2px solid var(--gold); 
            backdrop-filter: blur(12px); 
            border-radius: 12px; 
        }
        ::-webkit-scrollbar { 
            width: 4px; 
        }
        ::-webkit-scrollbar-thumb { 
            background: var(--cyan); 
            border-radius: 2px; 
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between pb-24">

    <!-- BARRA SUPERIOR -->
    <div class="app-bar p-4 flex flex-col gap-3 sticky top-0 z-50 shadow-lg">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-4">
                <span onclick="goBack()" class="cursor-pointer text-xl hover:scale-110 transition text-cyan-400">⬅️</span>
                <div>
                    <div id="pathDisp" class="text-xs text-white font-bold font-mono">/13.122.11.89</div>
                    <div class="text-[9px] text-yellow-400 font-mono" id="syncStatus">Sincronizador JDP: Ocioso</div>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-cyan-500 animate-pulse"></span>
                <span class="text-[9px] text-cyan-400 font-bold uppercase tracking-wider">JDP INDUSTRIAL</span>
            </div>
        </div>
        
        <!-- TOKEN E CONEXÃO EM TEMPO REAL -->
        <div class="flex gap-2 items-center bg-black/40 p-2 rounded border border-cyan-500/20">
            <span class="text-[9px] text-cyan-400 font-bold">CHAVE DE ACESSO:</span>
            <input type="password" id="gitToken" placeholder="Insira o GitHub Token para gravar" class="flex-1 bg-transparent text-[10px] text-yellow-300 outline-none border-none font-mono" onchange="saveToken(this.value)">
            <button onclick="requestHardwareFolderPermission()" class="bg-cyan-500 hover:bg-cyan-400 text-black font-black text-[9px] px-2 py-1 rounded transition">
                🔗 CONECTAR HD
            </button>
        </div>
    </div>

    <!-- CONSOLE DE LOGS DE BACKUP (ESTILO HELENA INDUSTRIAL) -->
    <div class="max-w-6xl w-full mx-auto px-4 mt-2">
        <div class="bg-slate-950 border border-cyan-500/20 rounded p-2 text-[9px] text-slate-400 font-mono h-20 overflow-y-auto" id="terminalLogs">
            [HELENA CORE v13.5]: Conectada ao Criador Sr. José Divino Prado da Lapa.<br>
            [SISTEMA]: Monitorando canal seguro 'Princesa Diamante'. Redirecionado para o servidor: pradodalapa-hue/13.122.11.89
        </div>
    </div>

    <!-- LISTAGEM DE ARQUIVOS -->
    <div class="max-w-6xl w-full mx-auto p-4 flex-1">
        <div id="list" class="divide-y divide-slate-800 bg-slate-950/50 rounded-xl border border-slate-800/80 overflow-hidden">
            <!-- Injetado dinamicamente -->
        </div>
    </div>

    <!-- BOTÕES FLUTUANTES (FAB) -->
    <div class="fixed bottom-6 right-6 z-50">
        <div class="hidden flex-col gap-2 mb-3 items-end" id="fabMenu">
            <button onclick="forceBackupAll()" class="bg-yellow-500 border border-yellow-300 text-black px-4 py-2 rounded-lg text-xs font-bold shadow-lg flex items-center gap-2">
                🔄 Forçar Espelhamento Android
            </button>
            <button onclick="openModal('folder')" class="bg-slate-900 border border-yellow-400 text-white px-4 py-2 rounded-lg text-xs font-bold shadow-lg flex items-center gap-2">
                📁 Nova Pasta
            </button>
            <button onclick="openModal('text')" class="bg-slate-900 border border-cyan-400 text-white px-4 py-2 rounded-lg text-xs font-bold shadow-lg flex items-center gap-2">
                📄 Novo Texto / HTML
            </button>
        </div>
        <button onclick="toggleMenu()" class="w-14 h-14 bg-cyan-500 text-black font-black text-2xl rounded-full flex items-center justify-center shadow-2xl hover:scale-105 transition">
            +
        </button>
    </div>

    <!-- MODAL DE CRIAÇÃO -->
    <div id="modal" class="hidden fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[90%] max-w-md jdp-card p-6 z-50">
        <h3 id="mTitle" class="text-white font-black text-sm uppercase tracking-wider mb-4">Criar Novo Item</h3>
        <input type="text" id="mName" placeholder="Ex: minha_pasta ou index.html" class="w-full bg-black border border-yellow-500/40 rounded p-2 text-white text-xs font-mono mb-3 focus:outline-none focus:border-yellow-400">
        <textarea id="mText" placeholder="Digite o conteúdo ou código HTML aqui..." class="hidden w-full h-48 bg-black border border-cyan-500/40 rounded p-2 text-white text-xs font-mono mb-4 focus:outline-none focus:border-cyan-400"></textarea>                                   
        <div class="flex gap-2">
            <button onclick="save()" class="flex-1 bg-yellow-400 text-black font-black py-2.5 rounded text-xs uppercase tracking-wider hover:bg-yellow-300 transition">OK</button>
            <button onclick="closeModal()" class="flex-1 border border-slate-700 text-slate-400 py-2.5 rounded text-xs uppercase tracking-wider hover:text-white transition">Cancelar</button>
        </div>
    </div>

<script>
    const REPO = 'pradodalapa-hue/13.122.11.89';
    const PAGES_URL = 'https://pradodalapa-hue.github.io/13.122.11.89';
    let currentPath = '';
    let currentFilesList = [];
    let physicalDirectoryHandle = null;

    // Inicializar Token Salvo do Criador
    window.addEventListener('DOMContentLoaded', () => {
        const savedToken = localStorage.getItem('jdp_token');
        if (savedToken) {
            document.getElementById('gitToken').value = savedToken;
            logHELENA("[MURALHA]: Token de acesso restaurado do cofre local.");
        }
        load();
    });

    function saveToken(val) {
        localStorage.setItem('jdp_token', val);
        logHELENA("[SEGURANÇA]: Token atualizado e blindado com sucesso.");
        load(currentPath);
    }

    // Registro do Service Worker Guardião da HELENA
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => logHELENA("[GUARDIÃO SW]: Ativo e monitorando rotas de sobrevivência."))
                .catch(err => logHELENA("[GUARDIÃO SW] Alerta de ativação: " + err.message));
        });
    }

    function logHELENA(msg) {
        const terminal = document.getElementById('terminalLogs');
        const time = new Date().toLocaleTimeString();
        terminal.innerHTML += `<br>[${time}] ${msg}`;
        terminal.scrollTop = terminal.scrollHeight;
    }

    // ==========================================
    // PROTOCOLO SUPREMO: GRAVAÇÃO DIRETA NO DISCO RIGIDO
    // ==========================================
    async function requestHardwareFolderPermission() {
        try {
            logHELENA("[SISTEMA]: Solicitando permissão de pasta física do dispositivo...");
            physicalDirectoryHandle = await window.showDirectoryPicker();
            logHELENA("[SUCESSO]: Conexão direta com o disco rígido estabelecida!");
            document.getElementById('syncStatus').innerText = "Sincronizador: Disco Rígido Conectado";
            document.getElementById('syncStatus').className = "text-[9px] text-green-400 font-mono font-bold animate-pulse";
            await forceBackupAll();
        } catch (err) {
            logHELENA("[AVISO]: Permissão de pasta física negada ou não suportada.");
        }
    }

    async function writeToPhysicalDisk(filePath, content) {
        if (!physicalDirectoryHandle) return;
        try {
            const pathParts = filePath.split('/');
            let currentHandle = physicalDirectoryHandle;

            for (let i = 0; i < pathParts.length - 1; i++) {
                currentHandle = await currentHandle.getDirectoryHandle(pathParts[i], { create: true });
            }

            const fileName = pathParts[pathParts.length - 1];
            const fileHandle = await currentHandle.getFileHandle(fileName, { create: true });
            const writable = await fileHandle.createWritable();
            await writable.write(content);
            await writable.close();
            logHELENA(`[DISCO RÍGIDO]: Gravado com sucesso -> /${filePath}`);
        } catch (err) {
            logHELENA(`[ERRO DISCO]: Falha ao gravar no HD: ${err.message}`);
        }
    }

    // ==========================================
    // OPERAÇÕES DO SERVIDOR GITHUB (13.122.11.89)
    // ==========================================
    async function load(path = '') {
        currentPath = path;
        document.getElementById('pathDisp').innerText = '/13.122.11.89/' + path;
        const token = localStorage.getItem('jdp_token');
        
        try {
            const headers = {};
            if (token) headers['Authorization'] = `token ${token}`;
            
            logHELENA(`[REQUISITANDO]: Acessando diretório /${path}...`);
            const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}?t=${Date.now()}`, { headers });
            
            if(!r.ok) {
                if (r.status === 404 && path === '') {
                    logHELENA("[AVISO]: Repositório vazio. Crie seu primeiro arquivo!");
                    renderEmptyState();
                    return;
                }
                throw new Error(`Erro HTTP: ${r.status}`);
            }

            const files = await r.json();
            currentFilesList = Array.isArray(files) ? files : [files];

            let html = '';
            if(currentPath) {
                html += `
                <div class="file-item p-4 flex items-center gap-3 cursor-pointer" onclick="goBack()">
                    <span class="text-lg">🔙</span>
                    <span class="text-xs text-cyan-400 font-bold uppercase">.. (Voltar)</span>
                </div>`;
            }

            if (currentFilesList.length > 0) {
                currentFilesList.forEach(f => {
                    const isDir = f.type === 'dir';
                    const isHtml = f.name.endsWith('.html');
                    const sizeText = isDir ? 'PASTA' : (f.size / 1024).toFixed(1) + ' KB';

                    html += `
                    <div class="file-item p-4 flex items-center justify-between cursor-pointer">
                        <div class="flex items-center gap-3 flex-1" onclick="${isDir ? `load('${f.path}')` : `openFile('${f.name}', '${f.download_url}')`}">
                            <span class="text-lg">${isDir ? '📁' : '📄'}</span>
                            <div>
                                <span class="text-xs text-white font-mono font-bold">${f.name}</span>
                                <span class="block text-[8px] text-slate-500">/${f.path}</span>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            ${isHtml ? `
                                <button onclick="runHtmlDirect('${f.path}')" class="bg-cyan-500/20 hover:bg-cyan-500 text-cyan-300 hover:text-black border border-cyan-500/40 px-2 py-1 rounded text-[9px] font-bold transition">
                                    ⚡ EXECUTAR
                                </button>
                            ` : ''}
                            <span class="text-[10px] text-slate-500 font-mono">${sizeText}</span>
                        </div>
                    </div>`;
                });
                
                document.getElementById('list').innerHTML = html;
                triggerAndroidMirroring();
            } else {
                renderEmptyState();
            }
        } catch (err) {
            logHELENA("❌ FALHA DE CONEXÃO: Carregando do cofre offline...");
            loadLocalAndroidFallback();
        }
    }

    function renderEmptyState() {
        document.getElementById('list').innerHTML = `
        <div class="p-8 text-center text-slate-500 text-xs font-bold uppercase">
            <i class="fas fa-folder-open text-lg mb-2 block"></i>
            Esta pasta está vazia ou não possui arquivos. Use o "+" para adicionar.
        </div>`;
    }

    function runHtmlDirect(path) {
        logHELENA(`[EXECUTANDO ROTA REAL]: /${path}`);
        const runUrl = `${PAGES_URL}/${path}`;
        window.open(runUrl, '_blank');
    }

    function openFile(name, downloadUrl) {
        logHELENA(`[ABRINDO ARQUIVO]: ${name}`);
        window.open(downloadUrl, '_blank');
    }

    // ==========================================
    // PROTOCOLO DE ESPELHAMENTO HELENA (OFFLINE / BACKUP)
    // ==========================================
    async function triggerAndroidMirroring() {
        document.getElementById('syncStatus').innerText = "Sincronizador: Espelhando...";
        document.getElementById('syncStatus').className = "text-[9px] text-cyan-400 font-mono animate-pulse";

        for (let file of currentFilesList) {
            if (file.type !== 'dir') {
                try {
                    const response = await fetch(file.download_url);
                    const content = await response.text();

                    // 1. IndexedDB do Navegador
                    if (navigator.serviceWorker.controller) {
                        navigator.serviceWorker.controller.postMessage({
                            type: 'PRESERVE_FILE',
                            path: file.path,
                            content: content,
                            isDir: false
                        });
                    }

                    // 2. Gravação em Disco Físico (se conectado)
                    if (physicalDirectoryHandle) {
                        await writeToPhysicalDisk(file.path, content);
                    }

                    // 3. Android via Capacitor
                    if (typeof Capacitor !== 'undefined') {
                        const { Filesystem } = Capacitor.Plugins;
                        const Directory = { Documents: 'DOCUMENTS' };
                        await Filesystem.writeFile({
                            path: `JDP_Sistemas_Backup/${file.path}`,
                            data: content,
                            directory: Directory.Documents,
                            encoding: 'utf8',
                            recursive: true
                        });
                    }

                    logHELENA(`[OK COFRE]: Blindado -> ${file.name}`);
                } catch (e) {
                    logHELENA(`[AVISO]: Falha ao espelhar ${file.name}: ${e.message}`);
                }
            }
        }
        document.getElementById('syncStatus').innerText = "Sincronizador: 100% Blindado no Servidor e Dispositivo";
        document.getElementById('syncStatus').className = "text-[9px] text-green-400 font-mono font-bold";
    }

    async function loadLocalAndroidFallback() {
        logHELENA("[EMERGÊNCIA]: Ativando banco de dados local...");
        const request = indexedDB.open('HELENA_DATABASE', 1);
        
        request.onsuccess = (event) => {
            const db = event.target.result;
            const transaction = db.transaction('files', 'readonly');
            const store = transaction.objectStore('files');
            const getAll = store.getAll();

            getAll.onsuccess = () => {
                const files = getAll.result;
                let html = '';
                if (files && files.length > 0) {
                    files.forEach(f => {
                        html += `
                        <div class="file-item p-4 flex items-center justify-between cursor-pointer" onclick="alert('Conteúdo recuperado do cofre local:\\n\\n' + \`${f.content}\`)">
                            <div class="flex items-center gap-3">
                                <span class="text-lg">🛡️</span>
                                <div>
                                    <span class="text-xs text-yellow-300 font-mono font-bold">${f.path}</span>
                                    <span class="block text-[8px] text-cyan-400">RECUPERADO DO COFRE LOCAL</span>
                                </div>
                            </div>
                        </div>`;
                    });
                } else {
                    html += `<div class="p-8 text-center text-yellow-500 text-xs font-bold uppercase">Cofre local vazio. Aguardando conexão.</div>`;
                }
                document.getElementById('list').innerHTML = html;
            };
        };
    }

    function forceBackupAll() {
        logHELENA("[COMANDO CRIADOR]: Sincronização forçada inicializada...");
        triggerAndroidMirroring();
    }

    function toggleMenu() {
        const m = document.getElementById('fabMenu');
        m.classList.toggle('hidden');
        m.classList.toggle('flex');
    }

    function openModal(type) {
        window.lastType = type;
        document.getElementById('modal').classList.remove('hidden');
        document.getElementById('mText').style.display = type === 'text' ? 'block' : 'none';
        document.getElementById('mTitle').innerText = type === 'text' ? 'Criar Novo Arquivo' : 'Criar Nova Pasta';
        document.getElementById('fabMenu').classList.add('hidden');
    }

    async function getSha(path, token) {
        const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
            headers: { 'Authorization': `token ${token}` }
        });
        if (r.ok) { const j = await r.json(); return j.sha; }
        return null;
    }

    async function save() {
        const name = document.getElementById('mName').value;
        const content = document.getElementById('mText').value;
        const token = localStorage.getItem('jdp_token');
        if (!name) return;

        if (!token) {
            alert("Mestre José, insira a Chave de Acesso (GitHub Token) na barra superior!");
            return;
        }

        const filePath = currentPath ? `${currentPath}/${name}` : name;

        try {
            logHELENA(`[GRAVANDO NO SERVIDOR]: Enviando ${name} para o repositório...`);
            
            let finalContent = content;
            let finalPath = filePath;
            
            // Se for pasta, cria um arquivo .placeholder para forçar a criação no Git
            if (window.lastType === 'folder') {
                finalPath = `${filePath}/.placeholder`;
                finalContent = "JDP_DIR_CREATION";
            }

            const sha = await getSha(finalPath, token);
            
            const response = await fetch(`https://api.github.com/repos/${REPO}/contents/${finalPath}`, {
                method: 'PUT',
                headers: { 
                    'Authorization': `token ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: `HELENA OPERATOR: Adicionado/Atualizado ${finalPath}`,
                    content: btoa(unescape(encodeURIComponent(finalContent))),
                    sha: sha || undefined
                })
            });

            if (response.ok) {
                logHELENA(`[SUCESSO]: ${name} salvo com sucesso no servidor!`);
                closeModal();
                load(currentPath);
            } else {
                throw new Error(`Código HTTP ${response.status}`);
            }

        } catch (err) {
            logHELENA("Erro ao salvar no servidor. Salvando localmente...");
            if (physicalDirectoryHandle) {
                await writeToPhysicalDisk(filePath, content);
                closeModal();
                load(currentPath);
            }
        }
    }

    function closeModal() {
        document.getElementById('modal').classList.add('hidden');
        document.getElementById('mName').value = '';
        document.getElementById('mText').value = '';
    }

    function goBack() {
        let p = currentPath.split('/');
        p.pop();
        load(p.join('/'));
    }
</script>
</body>
</html>
